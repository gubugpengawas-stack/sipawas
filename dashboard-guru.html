<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instrumen Guru - SIPAWAS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>
<body class="bg-gray-50 font-[sans-serif]">

    <header class="bg-teal-600 text-white shadow-md px-6 py-4 flex justify-between items-center">
        <div class="flex items-center gap-3">
            <i class="ph-bold ph-book-open text-2xl"></i>
            <h1 class="text-xl font-bold tracking-wide">SIPAWAS (Portal Guru)</h1>
        </div>
        <button onclick="logout()" class="text-sm bg-red-500 hover:bg-red-600 px-4 py-1.5 rounded transition font-semibold">Keluar</button>
    </header>

    <main class="max-w-4xl mx-auto p-6 md:p-8">
        <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-6 mb-6">
            <h2 class="text-2xl font-bold text-gray-800">Instrumen Pemantauan Kinerja Guru 👋</h2>
            <p class="text-gray-500 mt-1">Silakan isi formulir pemantauan di bawah ini dengan data yang sebenar-benarnya untuk diserahkan kepada Pengawas Sekolah.</p>
        </div>

        <form id="formInstrumen" class="space-y-6">
            <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100 space-y-4">
                <h3 class="text-lg font-bold text-gray-700 border-b pb-2"><i class="ph-bold ph-user-focus mr-2"></i>Identitas Guru</h3>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-semibold text-gray-600 mb-1">Nama Lengkap</label>
                        <input type="text" required class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-teal-500 bg-gray-50">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-gray-600 mb-1">NIP / NUPTK</label>
                        <input type="text" required class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-teal-500 bg-gray-50">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-gray-600 mb-1">Mata Pelajaran</label>
                        <input type="text" required class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-teal-500 bg-gray-50">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-gray-600 mb-1">Nama Sekolah Binaan</label>
                        <input type="text" required class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-teal-500 bg-gray-50">
                    </div>
                </div>
            </div>

            <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100 space-y-4">
                <h3 class="text-lg font-bold text-gray-700 border-b pb-2"><i class="ph-bold ph-list-checks mr-2"></i>Komponen Administrasi Pembelajaran</h3>
                
                <div class="space-y-4">
                    <div class="p-4 bg-gray-50 rounded-lg">
                        <label class="block text-sm font-medium text-gray-700 mb-2">1. Apakah Anda sudah menyusun Alur Tujuan Pembelajaran (ATP) / Silabus secara mandiri?</label>
                        <div class="flex gap-4">
                            <label class="flex items-center gap-2"><input type="radio" name="q1" value="Sudah" required class="text-teal-600"> Sudah</label>
                            <label class="flex items-center gap-2"><input type="radio" name="q1" value="Belum" class="text-teal-600"> Belum</label>
                        </div>
                    </div>

                    <div class="p-4 bg-gray-50 rounded-lg">
                        <label class="block text-sm font-medium text-gray-700 mb-2">2. Apakah Modul Ajar / RPP yang digunakan sudah mengintegrasikan kemampuan literasi dan numerasi?</label>
                        <div class="flex gap-4">
                            <label class="flex items-center gap-2"><input type="radio" name="q2" value="Sudah" required class="text-teal-600"> Sudah</label>
                            <label class="flex items-center gap-2"><input type="radio" name="q2" value="Belum" class="text-teal-600"> Belum</label>
                        </div>
                    </div>
                </div>
            </div>

            <button type="submit" class="w-full bg-teal-600 hover:bg-teal-700 text-white font-bold py-3 px-4 rounded-xl shadow transition duration-200 flex items-center justify-center gap-2">
                <i class="ph-bold ph-paper-plane-right"></i> Kirim Dokumen Instrumen
            </button>
        </form>
    </main>

    <script>
        document.getElementById('formInstrumen').addEventListener('submit', function(e) {
            e.preventDefault();
            alert("Terima kasih! Instrumen Anda berhasil dikirim ke database Pengawas.");
            this.reset();
        });

        function logout() {
            alert("Anda telah keluar.");
            window.location.href = "index.html";
        }
    </script>
</body>
</html>
