<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instrumen Kepala Sekolah - SIPAWAS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>
<body class="bg-gray-50 font-[sans-serif]">

    <header class="bg-teal-800 text-white shadow-md px-6 py-4 flex justify-between items-center">
        <div class="flex items-center gap-3">
            <i class="ph-bold ph-graduation-cap text-2xl"></i>
            <h1 class="text-xl font-bold tracking-wide">SIPAWAS (Portal Kepala Sekolah)</h1>
        </div>
        <button onclick="logout()" class="text-sm bg-red-500 hover:bg-red-600 px-4 py-1.5 rounded transition font-semibold">Keluar</button>
    </header>

    <main class="max-w-4xl mx-auto p-6 md:p-8">
        <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-6 mb-6">
            <h2 class="text-2xl font-bold text-gray-800">Instrumen Pemantauan Manajerial Kepala Sekolah 👋</h2>
            <p class="text-gray-500 mt-1">Silakan lengkapi instrumen ketercapaian standar sekolah di bawah ini untuk dilaporkan langsung kepada Pengawas Bina.</p>
        </div>

        <form id="formKepsek" class="space-y-6">
            <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100 space-y-4">
                <h3 class="text-lg font-bold text-gray-700 border-b pb-2"><i class="ph-bold ph-buildings mr-2"></i>Identitas Kepala Sekolah & Satuan Pendidikan</h3>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-semibold text-gray-600 mb-1">Nama Lengkap Kepala Sekolah</label>
                        <input type="text" required class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-teal-500 bg-gray-50">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-gray-600 mb-1">NIP</label>
                        <input type="text" required class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-teal-500 bg-gray-50">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-gray-600 mb-1">Nama Instansi / Sekolah</label>
                        <input type="text" required class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-teal-500 bg-gray-50">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-gray-600 mb-1">Kecamatan / Wilayah Binaan</label>
                        <input type="text" required class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-teal-500 bg-gray-50">
                    </div>
                </div>
            </div>

            <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100 space-y-4">
                <h3 class="text-lg font-bold text-gray-700 border-b pb-2"><i class="ph-bold ph-chart-bar mr-2"></i>Komponen Ketercapaian Standar Nasional Pendidikan</h3>
                
                <div class="space-y-4">
                    <div class="p-4 bg-gray-50 rounded-lg">
                        <label class="block text-sm font-medium text-gray-700 mb-2">1. Apakah sekolah sudah menyusun Rencana Kegiatan dan Anggaran Sekolah (ARKAS) berbasis rapor pendidikan terbaru?</label>
                        <div class="flex gap-4">
                            <label class="flex items-center gap-2"><input type="radio" name="k1" value="Sudah" required class="text-teal-700"> Sudah</label>
                            <label class="flex items-center gap-2"><input type="radio" name="k1" value="Belum" class="text-teal-700"> Belum</label>
                        </div>
                    </div>

                    <div class="p-4 bg-gray-50 rounded-lg">
                        <label class="block text-sm font-medium text-gray-700 mb-2">2. Apakah pelaksanaan Supervisi Akademik terhadap Guru terlaksana secara berkala minimum 1 kali per semester?</label>
                        <div class="flex gap-4">
                            <label class="flex items-center gap-2"><input type="radio" name="k2" value="Sudah" required class="text-teal-700"> Sudah</label>
                            <label class="flex items-center gap-2"><input type="radio" name="k2" value="Belum" class="text-teal-700"> Belum</label>
                        </div>
                    </div>
                </div>
            </div>

            <button type="submit" class="w-full bg-teal-800 hover:bg-teal-900 text-white font-bold py-3 px-4 rounded-xl shadow transition duration-200 flex items-center justify-center gap-2">
                <i class="ph-bold ph-check-square-offset"></i> Kirim Laporan Manajerial
            </button>
        </form>
    </main>

    <script>
        document.getElementById('formKepsek').addEventListener('submit', function(e) {
            e.preventDefault();
            alert("Laporan Manajerial Kepala Sekolah berhasil terkirim ke sistem pengawasan.");
            this.reset();
        });

        function logout() {
            alert("Anda telah keluar.");
            window.location.href = "index.html";
        }
    </script>
</body>
</html>
